<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="400"
     viewBox="0 0 1024 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e40af" stop-opacity="1"/>
      <stop offset="100%" stop-color="#1e40af" stop-opacity="0.85"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="400" fill="url(#bg)"/>
  <text x="512" y="80" text-anchor="middle" font-family="Pretendard, system-ui, sans-serif"
        font-size="32" font-weight="700" fill="white" opacity="0.9">
    프리랜서 종소세 환급 도우미
  </text>
  <text x="512" y="115" text-anchor="middle" font-family="Pretendard, system-ui, sans-serif"
        font-size="16" font-weight="400" fill="white" opacity="0.7">
    사용법 (5초 데모)
  </text>

  <g opacity="0">
    <circle cx="80" cy="180" r="40" fill="white" fill-opacity="0.15"/>
    <text x="80" y="195" text-anchor="middle" font-size="42">🧾</text>
    <text x="80" y="260" text-anchor="middle" font-family="Pretendard, system-ui, sans-serif"
          font-size="20" font-weight="700" fill="white">영수증 입력</text>
    <animate attributeName="opacity" values="0;1;1;0"
             keyTimes="0;0.1;0.85;1" dur="5s" begin="0.0s" repeatCount="indefinite"/>
  </g>
  <g opacity="0">
    <circle cx="368" cy="180" r="40" fill="white" fill-opacity="0.15"/>
    <text x="368" y="195" text-anchor="middle" font-size="42">📂</text>
    <text x="368" y="260" text-anchor="middle" font-family="Pretendard, system-ui, sans-serif"
          font-size="20" font-weight="700" fill="white">9 카테고리</text>
    <animate attributeName="opacity" values="0;1;1;0"
             keyTimes="0;0.1;0.85;1" dur="5s" begin="1.25s" repeatCount="indefinite"/>
  </g>
  <g opacity="0">
    <circle cx="656" cy="180" r="40" fill="white" fill-opacity="0.15"/>
    <text x="656" y="195" text-anchor="middle" font-size="42">⚠️</text>
    <text x="656" y="260" text-anchor="middle" font-family="Pretendard, system-ui, sans-serif"
          font-size="20" font-weight="700" fill="white">누락 경고</text>
    <animate attributeName="opacity" values="0;1;1;0"
             keyTimes="0;0.1;0.85;1" dur="5s" begin="2.5s" repeatCount="indefinite"/>
  </g>
  <g opacity="0">
    <circle cx="944" cy="180" r="40" fill="white" fill-opacity="0.15"/>
    <text x="944" y="195" text-anchor="middle" font-size="42">💰</text>
    <text x="944" y="260" text-anchor="middle" font-family="Pretendard, system-ui, sans-serif"
          font-size="20" font-weight="700" fill="white">환급액</text>
    <animate attributeName="opacity" values="0;1;1;0"
             keyTimes="0;0.1;0.85;1" dur="5s" begin="3.75s" repeatCount="indefinite"/>
  </g>

  <rect x="80" y="340" width="864" height="6" fill="white" fill-opacity="0.2" rx="3"/>
  <rect x="80" y="340" width="0" height="6" fill="white" rx="3">
    <animate attributeName="width" from="0" to="864" dur="5s" repeatCount="indefinite"/>
  </rect>
</svg>
